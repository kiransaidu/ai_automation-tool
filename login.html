<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
body {font-family: Arial, sans-serif; background: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
form {background: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px;}
label {display: block; margin-top: 10px;}
input[type="text"], input[type="password"] {width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
input[type="submit"] {width: 100%; background: #4CAF50; color: white; padding: 10px; margin-top: 15px; border: none; border-radius: 4px; cursor: pointer;}
input[type="submit"]:hover {background: #45a049;}
</style>
</head>
<body>
<form action="#" method="post">
  <label for="username">Username</label>
  <input type="text" id="username" name="username" required>
  <label for="password">Password</label>
  <input type="password" id="password" name="password" required>
  <input type="submit" value="Login">
</form>
</body>
</html>
